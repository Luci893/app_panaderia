<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#8B4513">
    <meta name="description" content="App de gestión de stock de ingredientes para panadería">
    <title>Panadería - Gestión de Ingredientes</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
    <!-- Icono para iOS -->
    <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <h1>🧂 Panadería Ingredientes</h1>
            <button id="btn-menu" class="btn-icon" aria-label="Menú">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </header>

        <!-- Navegación inferior (móvil) -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-view="stock">
                <span class="nav-icon">📦</span>
                <span class="nav-label">Stock</span>
            </button>
            <button class="nav-item" data-view="movements">
                <span class="nav-icon">📋</span>
                <span class="nav-label">Historial</span>
            </button>
            <button class="nav-item" data-view="settings">
                <span class="nav-icon">⚙️</span>
                <span class="nav-label">Ajustes</span>
            </button>
        </nav>

        <!-- VISTA: Lista de Stock -->
        <main id="view-stock" class="view active">
            <div class="view-header">
                <h2>Ingredientes</h2>
                <button id="btn-add-product" class="btn-primary">+ Agregar Ingrediente</button>
            </div>

            <!-- Buscador y filtros -->
            <div class="search-filters">
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="Buscar ingrediente...">
                    <button id="btn-search" class="btn-icon-small">🔍</button>
                </div>
                <select id="filter-category" class="filter-select">
                    <option value="all">Todas las categorías</option>
                    <option value="harinas">Harinas</option>
                    <option value="azucares">Azúcares</option>
                    <option value="levaduras">Levaduras</option>
                    <option value="grasas">Grasas</option>
                    <option value="otros">Otros</option>
                </select>
            </div>

            <!-- Lista de productos -->
            <div id="products-list" class="products-list">
                <!-- Los productos se renderizan dinámicamente -->
            </div>

            <!-- Estado vacío -->
            <div id="empty-state" class="empty-state hidden">
                <p>No hay ingredientes agregados</p>
                <button id="btn-add-first" class="btn-secondary">Agregar primer ingrediente</button>
            </div>
        </main>

        <!-- VISTA: Historial de Movimientos -->
        <main id="view-movements" class="view">
            <div class="view-header">
                <h2>Historial de Movimientos</h2>
            </div>

            <!-- Filtros de historial -->
            <div class="history-filters">
                <select id="filter-movement-type" class="filter-select">
                    <option value="all">Todos los movimientos</option>
                    <option value="ingreso">Ingresos</option>
                    <option value="egreso">Egresos</option>
                </select>
                <button id="btn-clear-history" class="btn-danger-small">Limpiar</button>
            </div>

            <!-- Lista de movimientos -->
            <div id="movements-list" class="movements-list">
                <!-- Los movimientos se renderizan dinámicamente -->
            </div>

            <div id="empty-movements" class="empty-state hidden">
                <p>No hay movimientos registrados</p>
            </div>
        </main>

        <!-- VISTA: Ajustes -->
        <main id="view-settings" class="view">
            <div class="view-header">
                <h2>Ajustes</h2>
            </div>

            <div class="settings-section">
                <h3>Umbrales de stock</h3>
                <div class="setting-item">
                    <label for="threshold-low">Stock bajo:</label>
                    <input type="number" id="threshold-low" min="1" value="10">
                </div>
                <div class="setting-item">
                    <label for="threshold-critical">Stock crítico:</label>
                    <input type="number" id="threshold-critical" min="1" value="5">
                </div>
            </div>

            <div class="settings-section">
                <h3>Datos</h3>
                <button id="btn-export-data" class="btn-secondary">Exportar datos</button>
                <button id="btn-import-data" class="btn-secondary">Importar datos</button>
                <input type="file" id="file-import" accept=".json" hidden>
            </div>

        </main>

        <!-- MODAL: Agregar/Editar Producto -->
        <div id="modal-product" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="modal-title">Agregar Producto</h3>
                    <button id="btn-close-modal" class="btn-icon" aria-label="Cerrar">✕</button>
                </div>
                <form id="product-form" class="modal-form">
                    <input type="hidden" id="product-id">
                    
                    <div class="form-group">
                        <label for="product-name">Nombre del producto *</label>
                        <input type="text" id="product-name" required 
                               placeholder="Ej: Pan francés">
                    </div>

                    <div class="form-group">
                        <label for="product-category">Categoría *</label>
                        <select id="product-category" required>
                            <option value="">Seleccionar...</option>
                            <option value="panes">Panes</option>
                            <option value="facturas">Facturas</option>
                            <option value="galletas">Galletas</option>
                            <option value="tortas">Tortas</option>
                            <option value="otros">Otros</option>
                        </select>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="product-quantity">Cantidad inicial</label>
                            <input type="number" id="product-quantity" min="0" step="0.01" value="0">
                        </div>
                        <div class="form-group">
                            <label for="product-unit">Unidad *</label>
                            <select id="product-unit" required>
                                <option value="unidades">Unidades</option>
                                <option value="kg">Kilogramos</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="button" id="btn-cancel" class="btn-secondary">Cancelar</button>
                        <button type="submit" class="btn-primary">Guardar</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- MODAL: Movimiento (Ingreso/Egreso) -->
        <div id="modal-movement" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="movement-title">Registrar Movimiento</h3>
                    <button id="btn-close-movement" class="btn-icon" aria-label="Cerrar">✕</button>
                </div>
                <form id="movement-form" class="modal-form">
                    <input type="hidden" id="movement-product-id">
                    
                    <div class="form-group">
                        <label>Producto</label>
                        <div id="movement-product-name" class="product-name-display"></div>
                    </div>

                    <div class="form-group">
                        <label for="movement-type">Tipo de movimiento *</label>
                        <select id="movement-type" required>
                            <option value="">Seleccionar...</option>
                            <option value="ingreso">Ingreso (entrada)</option>
                            <option value="egreso">Egreso (salida)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="movement-quantity">Cantidad *</label>
                        <input type="number" id="movement-quantity" min="0.01" step="0.01" required 
                               placeholder="0">
                    </div>

                    <div class="form-group">
                        <label for="movement-reason">Motivo (opcional)</label>
                        <input type="text" id="movement-reason" 
                               placeholder="Ej: Compra, Venta, Uso interno">
                    </div>

                    <div class="form-actions">
                        <button type="button" id="btn-cancel-movement" class="btn-secondary">Cancelar</button>
                        <button type="submit" class="btn-primary">Registrar</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- TOAST: Mensajes de feedback -->
        <div id="toast-container" class="toast-container"></div>
    </div>

    <script src="app_panaderia.js"></script>
</body>
</html>
